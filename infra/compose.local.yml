services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: gamecastle
      POSTGRES_USER: gamecastle
      POSTGRES_PASSWORD: gamecastle_dev_only
    ports:
      - "5432:5432"
    volumes:
      - gamecastle-postgres:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gamecastle -d gamecastle"]
      interval: 5s
      timeout: 3s
      retries: 20
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: gamecastle
      MINIO_ROOT_PASSWORD: gamecastle_dev_only
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - gamecastle-minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: ["mc alias set local http://minio:9000 gamecastle gamecastle_dev_only && mc mb --ignore-existing local/gamecastle-assets && mc mb --ignore-existing local/gamecastle-artifacts"]
volumes:
  gamecastle-postgres:
  gamecastle-minio:
