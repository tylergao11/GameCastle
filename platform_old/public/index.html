<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GameCastle — AI 小游戏平台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f1a; color: #e0e0e0; }
    
    .header { padding: 20px 40px; border-bottom: 1px solid #2a2a4a; }
    .header h1 { font-size: 24px; color: #fff; }
    .header span { color: #7c5cfc; }
    
    .input-area { max-width: 700px; margin: 40px auto; padding: 0 20px; }
    .input-area input { 
      width: 100%; padding: 16px 20px; font-size: 18px; 
      background: #1a1a2e; border: 2px solid #2a2a4a; border-radius: 12px; 
      color: #fff; outline: none; transition: border-color 0.2s;
    }
    .input-area input:focus { border-color: #7c5cfc; }
    .input-area input::placeholder { color: #555; }
    .input-area button {
      margin-top: 12px; padding: 12px 32px; font-size: 16px;
      background: #7c5cfc; color: #fff; border: none; border-radius: 8px;
      cursor: pointer; transition: background 0.2s;
    }
    .input-area button:hover { background: #6a4be0; }
    
    .game-grid { max-width: 1200px; margin: 40px auto; padding: 0 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
    .game-card { background: #1a1a2e; border-radius: 12px; overflow: hidden; border: 1px solid #2a2a4a; transition: border-color 0.2s; cursor: pointer; }
    .game-card:hover { border-color: #7c5cfc; }
    .game-card .thumb { height: 160px; background: #252540; display: flex; align-items: center; justify-content: center; color: #555; font-size: 14px; }
    .game-card .info { padding: 16px; }
    .game-card .info h3 { font-size: 16px; margin-bottom: 4px; }
    .game-card .info p { font-size: 13px; color: #888; }
    
    .game-player { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); z-index: 100; }
    .game-player.active { display: flex; flex-direction: column; }
    .game-player .toolbar { padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; background: #1a1a2e; }
    .game-player .toolbar button { padding: 6px 16px; background: #333; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
    .game-player iframe { flex: 1; border: none; }
    .game-player .chat { padding: 12px 20px; display: flex; gap: 8px; background: #1a1a2e; }
    .game-player .chat input { flex: 1; padding: 8px 12px; background: #252540; border: 1px solid #333; border-radius: 8px; color: #fff; }
    .game-player .chat button { padding: 8px 16px; background: #7c5cfc; color: #fff; border: none; border-radius: 8px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="header"><h1><span>🏰</span> GameCastle</h1></div>
  
  <div class="input-area">
    <input type="text" id="promptInput" placeholder="描述你想玩的游戏... 例如: 一个太空射击游戏，躲避陨石收集能量">
    <button id="generateBtn">✨ 生成游戏</button>
  </div>

  <div class="game-grid" id="gameGrid">
    <!-- 游戏卡片动态插入 -->
    <div class="game-card">
      <div class="thumb">🎮 即将到来...</div>
      <div class="info"><h3>示例游戏</h3><p>平台跳跃</p></div>
    </div>
  </div>

  <div class="game-player" id="gamePlayer">
    <div class="toolbar">
      <span id="gameTitle">游戏名称</span>
      <button id="closePlayer">✕ 关闭</button>
    </div>
    <iframe id="gameFrame" src="about:blank"></iframe>
    <div class="chat">
      <input type="text" id="remixInput" placeholder="修改游戏... 如: 加快速度、加个Boss">
      <button id="remixBtn">发送</button>
    </div>
  </div>

  <script>
    // TODO: 平台交互逻辑
    document.getElementById('generateBtn').addEventListener('click', () => {
      const prompt = document.getElementById('promptInput').value;
      console.log('生成游戏:', prompt);
      // TODO: 调用 AI 生成管线
    });
    
    document.getElementById('closePlayer').addEventListener('click', () => {
      document.getElementById('gamePlayer').classList.remove('active');
    });
  </script>
</body>
</html>
