<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"><style>body{margin:0;padding:0;background:#000;overflow:hidden}#canvas{margin:0 auto;display:block}</style></head><body>
<script src="pixi.min.js"></script>
<script src="howler.min.js"></script>
<script src="gdjs-runtime.js"></script>
<script src="extensions/Sprite.js"></script>
<script src="extensions/TextObject.js"></script>
<script src="extensions/PlatformBehavior.js"></script>
<script src="extensions/TiledSpriteObject.js"></script>
<script>
// Load project data
var projectData = PROJECT_DATA_PLACEHOLDER;

// Patch pixi.js legacy API for GDevelop compatibility
if (typeof PIXI !== "undefined") {
  if (!PIXI.scaleModes) PIXI.scaleModes = { DEFAULT: 1, NEAREST: 0, LINEAR: 1 };
  if (!PIXI.SCALE_MODES) PIXI.SCALE_MODS = { NEAREST: 0, LINEAR: 1 };
}

var game = new gdjs.RuntimeGame(projectData, {});
game.getRenderer().createStandardCanvas(document.body);
game.getRenderer().bindStandardEvents(game.getInputManager(), window, document);
game.loadAllAssets(function() { game.startGameLoop(); });
</script>
</body></html>
